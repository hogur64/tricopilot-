<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef } = React;

/* ============ STOCKAGE : window.storage (Claude) sinon localStorage (téléphone) ============ */
const memStore = {};
async function loadKey(key, fallback) {
  try {
    if (window.storage && window.storage.get) {
      const r = await window.storage.get(key);
      return r && r.value ? JSON.parse(r.value) : fallback;
    }
  } catch {}
  try {
    const v = localStorage.getItem("tc_" + key);
    if (v !== null) return JSON.parse(v);
  } catch {}
  return memStore[key] !== undefined ? memStore[key] : fallback;
}
async function saveKey(key, value) {
  memStore[key] = value;
  try { if (window.storage && window.storage.set) await window.storage.set(key, JSON.stringify(value)); } catch {}
  try { localStorage.setItem("tc_" + key, JSON.stringify(value)); } catch {}
}

/* ============ DATES ============ */
const todayISO = () => new Date().toISOString().slice(0, 10);
const addDays = (iso, n) => { const d = new Date(iso + "T12:00:00"); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); };
const frDate = (iso) => new Date(iso + "T12:00:00").toLocaleDateString("fr-FR", { weekday: "short", day: "numeric", month: "short" });

/* ============ DISCIPLINES ============ */
const DISC = {
  natation: { label: "Natation", color: "#38BDF8", icon: "〰" },
  velo:     { label: "Vélo",     color: "#FBBF24", icon: "◎" },
  course:   { label: "Course",   color: "#FB7185", icon: "⟶" },
  muscu:    { label: "Renfo",    color: "#A78BFA", icon: "▲" },
  mobilite: { label: "Mobilité", color: "#34D399", icon: "≋" },
};

/* ============ TSS estimé (sRPE) ============ */
function estimateTSS(durationMin, rpe) {
  const IF = 0.50 + rpe * 0.052;
  return Math.round((durationMin / 60) * IF * IF * 100);
}

/* ============ ATL / CTL / TSB ============ */
function computeLoads(sessions, daysBack = 120) {
  const byDay = {};
  sessions.forEach(s => { byDay[s.date] = (byDay[s.date] || 0) + s.tss; });
  const end = todayISO(), start = addDays(end, -daysBack);
  const out = []; let atl = 0, ctl = 0;
  const kA = 1 - Math.exp(-1 / 7), kC = 1 - Math.exp(-1 / 42);
  for (let d = start; d <= end; d = addDays(d, 1)) {
    const tss = byDay[d] || 0;
    const tsb = ctl - atl;
    atl = atl + kA * (tss - atl);
    ctl = ctl + kC * (tss - ctl);
    out.push({ date: d, tss, atl: +atl.toFixed(1), ctl: +ctl.toFixed(1), tsb: +tsb.toFixed(1) });
  }
  return out;
}

/* ============ Risque migraine ============ */
function migraineRisk(daily, loads) {
  const t = todayISO();
  const d0 = daily[t] || {}, d1 = daily[addDays(t, -1)] || {}, d2 = daily[addDays(t, -2)] || {};
  let score = 0; const reasons = [];
  const sleep = d1.sleepH ?? null;
  if (sleep !== null && sleep < 6.5) { score += 2.5; reasons.push(`Sommeil court hier (${sleep} h)`); }
  const debt = [d0, d1, d2].reduce((a, d) => a + Math.max(0, 7.5 - (d.sleepH ?? 7.5)), 0);
  if (debt >= 3) { score += 1.5; reasons.push(`Dette de sommeil 3 j (${debt.toFixed(1)} h)`); }
  if (d1.waterL !== undefined && d1.waterL < 1.5) { score += 1.5; reasons.push(`Hydratation faible hier (${d1.waterL} L)`); }
  if ((d0.stress ?? 0) >= 4 || (d1.stress ?? 0) >= 4) { score += 1.5; reasons.push("Stress élevé"); }
  if ((d1.screenH ?? 0) > 8) { score += 1; reasons.push(`Écran > 8 h hier (${d1.screenH} h)`); }
  const last = loads[loads.length - 1];
  if (last && last.tsb < -25) { score += 1.5; reasons.push(`Fatigue d'entraînement (TSB ${last.tsb})`); }
  if (d1.coffee !== undefined && d0.coffee !== undefined && Math.abs(d0.coffee - d1.coffee) >= 2) { score += 1; reasons.push("Variation brutale de caféine"); }
  if ((d1.alcohol ?? 0) > 0) { score += 0.5; reasons.push("Alcool hier"); }
  const level = score >= 5 ? "élevé" : score >= 2.5 ? "modéré" : "faible";
  return { score: Math.min(10, +score.toFixed(1)), level, reasons };
}

/* ============ Corrélations migraines ============ */
function migraineCorrelations(migraines, daily) {
  const allDays = Object.keys(daily);
  if (migraines.length < 3 || allDays.length < 10) return null;
  const factors = [
    { key: "sleepH", label: "Sommeil (h)", dir: "low" },
    { key: "waterL", label: "Hydratation (L)", dir: "low" },
    { key: "stress", label: "Stress (1-5)", dir: "high" },
    { key: "screenH", label: "Écran (h)", dir: "high" },
    { key: "coffee", label: "Cafés (n)", dir: "high" },
  ];
  const preDays = new Set();
  migraines.forEach(m => { preDays.add(addDays(m.date, -1)); preDays.add(m.date); });
  const results = [];
  factors.forEach(f => {
    const pre = [], base = [];
    allDays.forEach(d => {
      const v = daily[d][f.key];
      if (v === undefined || v === null) return;
      (preDays.has(d) ? pre : base).push(v);
    });
    if (pre.length >= 2 && base.length >= 5) {
      const mPre = pre.reduce((a, b) => a + b, 0) / pre.length;
      const mBase = base.reduce((a, b) => a + b, 0) / base.length;
      const rel = mBase !== 0 ? ((mPre - mBase) / mBase) * 100 : 0;
      const suspicious = f.dir === "low" ? rel < -10 : rel > 10;
      results.push({ label: f.label, mPre: +mPre.toFixed(1), mBase: +mBase.toFixed(1), rel: +rel.toFixed(0), suspicious });
    }
  });
  return results.sort((a, b) => Math.abs(b.rel) - Math.abs(a.rel));
}

/* ============ Riegel ============ */
function riegel(distKm, timeMin, targetKm) { return timeMin * Math.pow(targetKm / distKm, 1.06); }
const fmtTime = (min) => { const h = Math.floor(min / 60), m = Math.round(min % 60); return h > 0 ? `${h}h${String(m).padStart(2, "0")}` : `${m} min`; };

/* ============ Score global ============ */
function globalScore(daily, loads, risk) {
  const d1 = daily[addDays(todayISO(), -1)] || {};
  let score = 70; const parts = [];
  if (d1.sleepH !== undefined) {
    const p = d1.sleepH >= 7.5 ? 15 : d1.sleepH >= 6.5 ? 8 : d1.sleepH >= 5.5 ? 0 : -10;
    score += p; parts.push({ label: "Sommeil", val: p });
  }
  const last = loads[loads.length - 1];
  if (last) {
    const p = last.tsb > 5 ? 10 : last.tsb > -10 ? 5 : last.tsb > -25 ? -5 : -12;
    score += p; parts.push({ label: "Forme (TSB)", val: p });
  }
  if (d1.stress !== undefined) {
    const p = d1.stress <= 2 ? 5 : d1.stress === 3 ? 0 : -8;
    score += p; parts.push({ label: "Stress", val: p });
  }
  score -= risk.score;
  parts.push({ label: "Risque migraine", val: -risk.score });
  return { score: Math.max(0, Math.min(100, Math.round(score))), parts };
}

/* ============ Contexte + appel coach IA (clé API personnelle) ============ */
function buildContext(profile, sessions, daily, migraines, loads) {
  const last = loads[loads.length - 1] || {};
  const recentDaily = {};
  for (let i = 0; i < 14; i++) { const d = addDays(todayISO(), -i); if (daily[d]) recentDaily[d] = daily[d]; }
  return JSON.stringify({
    profil: profile,
    charge: { ATL: last.atl, CTL: last.ctl, TSB: last.tsb },
    seances_recentes: sessions.slice(-20),
    journal_14j: recentDaily,
    migraines_recentes: migraines.slice(-10),
    date_du_jour: todayISO(),
  });
}
async function askCoach(history, context, apiKey) {
  const system = `Tu es le coach personnel de l'utilisateur : préparation triathlon, santé, sommeil, nutrition sportive, prévention migraines. Tu réponds en français, direct, concret, chiffré. Tu utilises TOUJOURS les données ci-dessous. Tu signales quand une question relève d'un médecin. Données: ${context}`;
  const headers = { "content-type": "application/json" };
  const insideClaude = !!(window.storage && window.storage.get);
  if (!insideClaude) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers,
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, system, messages: history.map(m => ({ role: m.role, content: m.text })) }),
  });
  if (!res.ok) throw new Error("api " + res.status);
  const data = await res.json();
  return (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n") || "Erreur de réponse.";
}

/* ============ GRAPHIQUES SVG (sans dépendance) ============ */
function LoadChart({ data }) {
  const W = 680, H = 240, P = { l: 36, r: 8, t: 12, b: 24 };
  if (!data.length) return null;
  const xs = i => P.l + (i / (data.length - 1 || 1)) * (W - P.l - P.r);
  const vals = data.flatMap(d => [d.atl, d.ctl, d.tsb]);
  const mn = Math.floor(Math.min(0, ...vals) - 2), mx = Math.ceil(Math.max(10, ...vals) + 2);
  const ys = v => P.t + (1 - (v - mn) / (mx - mn || 1)) * (H - P.t - P.b);
  const path = k => data.map((d, i) => `${i ? "L" : "M"}${xs(i).toFixed(1)},${ys(d[k]).toFixed(1)}`).join("");
  const area = k => path(k) + ` L${xs(data.length - 1).toFixed(1)},${ys(mn)} L${xs(0).toFixed(1)},${ys(mn)} Z`;
  const ticks = [mn, 0, Math.round((mn + mx) / 2), mx].filter((v, i, a) => a.indexOf(v) === i && v >= mn && v <= mx);
  const series = [["ctl", "#38BDF8", "Forme de fond (CTL)"], ["atl", "#FB7185", "Fatigue (ATL)"], ["tsb", "#FBBF24", "Fraîcheur (TSB)"]];
  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }} role="img" aria-label="Graphique de charge">
        {ticks.map((t, i) => (
          <g key={i}>
            <line x1={P.l} x2={W - P.r} y1={ys(t)} y2={ys(t)} stroke="var(--grid)" strokeDasharray="3 3" />
            <text x={P.l - 6} y={ys(t) + 3} textAnchor="end" fontSize="10" fill="var(--mut)">{t}</text>
          </g>
        ))}
        <line x1={P.l} x2={W - P.r} y1={ys(0)} y2={ys(0)} stroke="var(--mut)" strokeWidth="1" />
        <path d={area("ctl")} fill="#38BDF822" />
        <path d={area("atl")} fill="#FB718518" />
        {series.map(([k, c]) => <path key={k} d={path(k)} fill="none" stroke={c} strokeWidth="2" />)}
        {data.map((d, i) => (i % 14 === 0 || i === data.length - 1) && (
          <text key={i} x={xs(i)} y={H - 6} textAnchor="middle" fontSize="10" fill="var(--mut)">{d.date.slice(5)}</text>
        ))}
      </svg>
      <div className="tc-legend">{series.map(([k, c, l]) => <span key={k}><i style={{ background: c }} />{l}</span>)}</div>
    </div>
  );
}
function DiscBars({ data }) {
  if (!data.length) return null;
  const W = 680, H = 200, P = { l: 36, r: 8, t: 12, b: 26 };
  const mx = Math.max(...data.map(d => d.min), 10);
  const bw = (W - P.l - P.r) / data.length;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }} role="img" aria-label="Répartition par discipline">
      {[0, 0.5, 1].map((f, i) => (
        <g key={i}>
          <line x1={P.l} x2={W - P.r} y1={P.t + (1 - f) * (H - P.t - P.b)} y2={P.t + (1 - f) * (H - P.t - P.b)} stroke="var(--grid)" strokeDasharray="3 3" />
          <text x={P.l - 6} y={P.t + (1 - f) * (H - P.t - P.b) + 3} textAnchor="end" fontSize="10" fill="var(--mut)">{Math.round(mx * f)}</text>
        </g>
      ))}
      {data.map((d, i) => {
        const h = (d.min / mx) * (H - P.t - P.b);
        const x = P.l + i * bw + bw * 0.18;
        return (
          <g key={i}>
            <rect x={x} y={H - P.b - h} width={bw * 0.64} height={h} rx="6" fill={d.fill} />
            <text x={x + bw * 0.32} y={H - 8} textAnchor="middle" fontSize="10.5" fill="var(--mut)">{d.name}</text>
            <text x={x + bw * 0.32} y={H - P.b - h - 5} textAnchor="middle" fontSize="10.5" fill="var(--tx)">{d.min}</text>
          </g>
        );
      })}
    </svg>
  );
}
function TriCopilot() {
  const [ready, setReady] = useState(false);
  const [dark, setDark] = useState(true);
  const [view, setView] = useState("dashboard");
  const [profile, setProfile] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [daily, setDaily] = useState({});
  const [migraines, setMigraines] = useState([]);
  const [chat, setChat] = useState([]);
  const [apiKey, setApiKey] = useState("");

  useEffect(() => {
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600&display=swap";
    document.head.appendChild(link);
    (async () => {
      setProfile(await loadKey("profile", null));
      setSessions(await loadKey("sessions", []));
      setDaily(await loadKey("daily", {}));
      setMigraines(await loadKey("migraines", []));
      setChat(await loadKey("chat", []));
      setApiKey(await loadKey("apikey", ""));
      const th = await loadKey("theme", "dark");
      setDark(th === "dark");
      setReady(true);
    })();
  }, []);

  const loads = useMemo(() => computeLoads(sessions), [sessions]);
  const risk = useMemo(() => migraineRisk(daily, loads), [daily, loads]);
  const gScore = useMemo(() => globalScore(daily, loads, risk), [daily, loads, risk]);
  const correls = useMemo(() => migraineCorrelations(migraines, daily), [migraines, daily]);

  const persist = {
    profile: (v) => { setProfile(v); saveKey("profile", v); },
    sessions: (v) => { setSessions(v); saveKey("sessions", v); },
    daily: (v) => { setDaily(v); saveKey("daily", v); },
    migraines: (v) => { setMigraines(v); saveKey("migraines", v); },
    chat: (v) => { setChat(v); saveKey("chat", v); },
    apiKey: (v) => { setApiKey(v); saveKey("apikey", v); },
    theme: (d) => { setDark(d); saveKey("theme", d ? "dark" : "light"); },
  };

  if (!ready) return <div className="tc-root tc-dark" style={{ display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}><Css /><div className="tc-muted">Chargement…</div></div>;
  if (!profile) return <div className={dark ? "tc-root tc-dark" : "tc-root tc-light"}><Css /><Onboarding onDone={persist.profile} /></div>;

  const NAV = [
    ["dashboard", "Tableau de bord"],
    ["seances", "Séances"],
    ["journal", "Journal"],
    ["migraines", "Migraines"],
    ["coach", "Coach IA"],
    ["rapport", "Rapport"],
    ["profil", "Profil"],
  ];

  return (
    <div className={dark ? "tc-root tc-dark" : "tc-root tc-light"}>
      <Css />
      <div className="tc-tribar"><span style={{ background: DISC.natation.color }} /><span style={{ background: DISC.velo.color }} /><span style={{ background: DISC.course.color }} /></div>
      <header className="tc-header">
        <div className="tc-logo">TRI·COPILOT</div>
        <nav className="tc-nav">
          {NAV.map(([k, l]) => (
            <button key={k} className={view === k ? "tc-navbtn active" : "tc-navbtn"} onClick={() => setView(k)}>{l}</button>
          ))}
        </nav>
        <button className="tc-theme" onClick={() => persist.theme(!dark)} aria-label="Changer de thème">{dark ? "☀" : "☾"}</button>
      </header>
      <main className="tc-main">
        {view === "dashboard" && <Dashboard profile={profile} loads={loads} risk={risk} gScore={gScore} sessions={sessions} daily={daily} setView={setView} />}
        {view === "seances" && <Seances sessions={sessions} save={persist.sessions} profile={profile} />}
        {view === "journal" && <Journal daily={daily} save={persist.daily} />}
        {view === "migraines" && <Migraines migraines={migraines} save={persist.migraines} risk={risk} correls={correls} />}
        {view === "coach" && <Coach chat={chat} save={persist.chat} apiKey={apiKey} context={buildContext(profile, sessions, daily, migraines, loads)} />}
        {view === "rapport" && <Rapport sessions={sessions} daily={daily} loads={loads} migraines={migraines} />}
        {view === "profil" && <React.Fragment><Onboarding initial={profile} onDone={persist.profile} edit /><Reglages apiKey={apiKey} saveApiKey={persist.apiKey} data={{ profile, sessions, daily, migraines }} restore={persist} /></React.Fragment>}
      </main>
    </div>
  );
}

/* ============================================================
   ONBOARDING / PROFIL
   ============================================================ */
function Onboarding({ onDone, initial, edit }) {
  const [f, setF] = useState(initial || {
    name: "", age: "", sex: "H", heightCm: "", weightKg: "", targetWeightKg: "",
    hrMax: "", level: "intermédiaire", goalRace: "Triathlon M", goalDate: "",
    injuries: "", conditions: "migraines", workHours: "8", sleepTarget: "7.5",
  });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const ok = f.name && f.age && f.weightKg;
  return (
    <div className="tc-main" style={{ maxWidth: 720 }}>
      <h1 className="tc-h1">{edit ? "Profil" : "Bienvenue. Construisons ton profil."}</h1>
      <p className="tc-muted">Plus le profil est précis, plus les analyses et le coach IA sont pertinents.</p>
      <div className="tc-card">
        <div className="tc-grid2">
          <Field label="Prénom"><input className="tc-in" value={f.name} onChange={set("name")} /></Field>
          <Field label="Âge"><input className="tc-in" type="number" value={f.age} onChange={set("age")} /></Field>
          <Field label="Sexe">
            <select className="tc-in" value={f.sex} onChange={set("sex")}><option value="H">Homme</option><option value="F">Femme</option></select>
          </Field>
          <Field label="Taille (cm)"><input className="tc-in" type="number" value={f.heightCm} onChange={set("heightCm")} /></Field>
          <Field label="Poids (kg)"><input className="tc-in" type="number" step="0.1" value={f.weightKg} onChange={set("weightKg")} /></Field>
          <Field label="Poids cible (kg)"><input className="tc-in" type="number" step="0.1" value={f.targetWeightKg} onChange={set("targetWeightKg")} /></Field>
          <Field label="FC max (bpm) — si connue"><input className="tc-in" type="number" value={f.hrMax} onChange={set("hrMax")} /></Field>
          <Field label="Niveau">
            <select className="tc-in" value={f.level} onChange={set("level")}>
              <option>débutant</option><option>intermédiaire</option><option>avancé</option><option>compétiteur</option>
            </select>
          </Field>
          <Field label="Objectif course">
            <select className="tc-in" value={f.goalRace} onChange={set("goalRace")}>
              <option>Triathlon S</option><option>Triathlon M</option><option>Half Ironman</option><option>Ironman</option>
              <option>10 km</option><option>Semi-marathon</option><option>Marathon</option>
            </select>
          </Field>
          <Field label="Date de course"><input className="tc-in" type="date" value={f.goalDate} onChange={set("goalDate")} /></Field>
          <Field label="Objectif sommeil (h)"><input className="tc-in" type="number" step="0.5" value={f.sleepTarget} onChange={set("sleepTarget")} /></Field>
          <Field label="Heures de travail / jour"><input className="tc-in" type="number" value={f.workHours} onChange={set("workHours")} /></Field>
        </div>
        <Field label="Antécédents / pathologies (ex. migraines)"><input className="tc-in" value={f.conditions} onChange={set("conditions")} /></Field>
        <Field label="Historique de blessures"><input className="tc-in" value={f.injuries} onChange={set("injuries")} /></Field>
        <button className="tc-btn" disabled={!ok} onClick={() => onDone(f)} style={{ marginTop: 16 }}>{edit ? "Enregistrer" : "Créer mon profil"}</button>
        {!ok && <div className="tc-muted" style={{ marginTop: 8, fontSize: 13 }}>Prénom, âge et poids sont requis.</div>}
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return <label className="tc-field"><span className="tc-label">{label}</span>{children}</label>;
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function Dashboard({ profile, loads, risk, gScore, sessions, daily, setView }) {
  const last = loads[loads.length - 1] || {};
  const daysToRace = profile.goalDate ? Math.ceil((new Date(profile.goalDate) - new Date()) / 86400000) : null;
  const week = loads.slice(-7);
  const weekTss = week.reduce((a, d) => a + d.tss, 0);
  const chartData = loads.slice(-56).map(d => ({ ...d, label: d.date.slice(5) }));
  const d1 = daily[addDays(todayISO(), -1)] || {};
  const noData = sessions.length === 0 && Object.keys(daily).length === 0;

  return (
    <div>

        </div>

        <StatCard title="Risque migraine" value={risk.level} hint={risk.reasons[0] || "Aucun facteur détecté"} color={risk.level === "faible" ? "var(--ok)" : risk.level === "modéré" ? "var(--warn)" : "var(--bad)"} />
        <StatCard title="Charge 7 j" value={`${weekTss} TSS`} hint={`ATL ${last.atl ?? "—"} · CTL ${last.ctl ?? "—"}`} color="var(--tx)" />
      </div>

      <div className="tc-card">
        <div className="tc-cardtitle">Charge d'entraînement — 8 semaines</div>

          ))}
          {risk.reasons.length > 0 && <>
            <div className="tc-cardtitle" style={{ marginTop: 14 }}>Facteurs de risque migraine</div>
            {risk.reasons.map((r, i) => <div key={i} className="tc-row tc-muted" style={{ fontSize: 13 }}>{r}</div>)}

          <div className="tc-row"><span>Hydratation</span><b>{d1.waterL !== undefined ? `${d1.waterL} L` : "non renseigné"}</b></div>
          <div className="tc-row"><span>Stress</span><b>{d1.stress !== undefined ? `${d1.stress}/5` : "non renseigné"}</b></div>

function ScoreRing({ score }) {
  const r = 44, c = 2 * Math.PI * r, off = c * (1 - score / 100);
  const col = score >= 70 ? "var(--ok)" : score >= 45 ? "var(--warn)" : "var(--bad)";
  return (
    <div className="tc-card tc-ringcard">
      <svg width="110" height="110" viewBox="0 0 110 110">
        <circle cx="55" cy="55" r={r} fill="none" stroke="var(--grid)" strokeWidth="10" />
        <circle cx="55" cy="55" r={r} fill="none" stroke={col} strokeWidth="10" strokeLinecap="round"
          strokeDasharray={c} strokeDashoffset={off} transform="rotate(-90 55 55)" style={{ transition: "stroke-dashoffset .6s" }} />
        <text x="55" y="60" textAnchor="middle" fill="var(--tx)" fontSize="26" fontWeight="700" fontFamily="'Barlow Condensed',sans-serif">{score}</text>
      </svg>
      <div className="tc-label" style={{ textAlign: "center" }}>Score santé du jour</div>
    </div>
  );
}
function StatCard({ title, value, hint, color }) {
  return (
    <div className="tc-card">
      <div className="tc-label">{title}</div>
      <div className="tc-big" style={{ color }}>{value}</div>
      <div className="tc-muted" style={{ fontSize: 12.5 }}>{hint}</div>
    </div>
  );
}

/* ============================================================

   ============================================================ */
function Seances({ sessions, save, profile }) {
  const [f, setF] = useState({ date: todayISO(), disc: "course", durationMin: "", distKm: "", elevM: "", hrAvg: "", rpe: 5, note: "" });
  const set = (k) => (e) => setF({ ...f, [k]: e.target.value });
  const add = () => {
    if (!f.durationMin) return;
    const s = { ...f, id: Date.now(), durationMin: +f.durationMin, distKm: f.distKm ? +f.distKm : null, elevM: f.elevM ? +f.elevM : null, hrAvg: f.hrAvg ? +f.hrAvg : null, rpe: +f.rpe };
    s.tss = estimateTSS(s.durationMin, s.rpe);
    save([...sessions, s].sort((a, b) => a.date.localeCompare(b.date)));
    setF({ ...f, durationMin: "", distKm: "", elevM: "", hrAvg: "", note: "" });
  };
  const del = (id) => save(sessions.filter(s => s.id !== id));
  const exportCsv = () => {
    const head = "date;discipline;duree_min;distance_km;deniv_m;fc_moy;rpe;tss;note\n";
    const rows = sessions.map(s => [s.date, s.disc, s.durationMin, s.distKm ?? "", s.elevM ?? "", s.hrAvg ?? "", s.rpe, s.tss, (s.note || "").replace(/;/g, ",")].join(";")).join("\n");
    const blob = new Blob([head + rows], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = "seances.csv"; a.click();
  };
  const recent = [...sessions].reverse().slice(0, 30);
  return (
    <div>
      <h1 className="tc-h1">Séances</h1>
      <div className="tc-card">
        <div className="tc-cardtitle">Nouvelle séance</div>
        <div className="tc-discpick">
          {Object.entries(DISC).map(([k, d]) => (
            <button key={k} className={f.disc === k ? "tc-disc active" : "tc-disc"} style={{ "--dc": d.color }} onClick={() => setF({ ...f, disc: k })}>{d.icon} {d.label}</button>
          ))}
        </div>
        <div className="tc-grid3">
          <Field label="Date"><input className="tc-in" type="date" value={f.date} onChange={set("date")} /></Field>
          <Field label="Durée (min) *"><input className="tc-in" type="number" value={f.durationMin} onChange={set("durationMin")} /></Field>
          <Field label="Distance (km)"><input className="tc-in" type="number" step="0.1" value={f.distKm} onChange={set("distKm")} /></Field>
          <Field label="Dénivelé (m)"><input className="tc-in" type="number" value={f.elevM} onChange={set("elevM")} /></Field>
          <Field label="FC moyenne (bpm)"><input className="tc-in" type="number" value={f.hrAvg} onChange={set("hrAvg")} /></Field>
          <Field label={`Effort perçu (RPE) : ${f.rpe}/10`}><input className="tc-range" type="range" min="1" max="10" value={f.rpe} onChange={set("rpe")} /></Field>
        </div>
        <Field label="Commentaire / ressenti"><input className="tc-in" value={f.note} onChange={set("note")} /></Field>
        <div style={{ display: "flex", gap: 10, marginTop: 12, alignItems: "center", flexWrap: "wrap" }}>
          <button className="tc-btn" onClick={add} disabled={!f.durationMin}>Enregistrer la séance</button>
          {f.durationMin && <span className="tc-muted" style={{ fontSize: 13 }}>TSS estimé : <b style={{ color: "var(--tx)" }}>{estimateTSS(+f.durationMin, +f.rpe)}</b> (méthode sRPE)</span>}
        </div>
      </div>
      <div className="tc-card">
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div className="tc-cardtitle" style={{ margin: 0 }}>Historique ({sessions.length})</div>
          {sessions.length > 0 && <button className="tc-btn tc-btn2" onClick={exportCsv}>Exporter CSV</button>}
        </div>
        {recent.length === 0 && <div className="tc-muted" style={{ marginTop: 10 }}>Aucune séance enregistrée. La première alimente immédiatement le calcul de charge.</div>}
        {recent.map(s => (
          <div key={s.id} className="tc-session">
            <span className="tc-discdot" style={{ background: DISC[s.disc].color }} />
            <div style={{ flex: 1 }}>
              <b>{DISC[s.disc].label}</b> · {frDate(s.date)} · {s.durationMin} min
              {s.distKm ? ` · ${s.distKm} km` : ""}{s.hrAvg ? ` · ${s.hrAvg} bpm` : ""}
              <span className="tc-muted"> · RPE {s.rpe} · TSS {s.tss}</span>
              {s.note && <div className="tc-muted" style={{ fontSize: 12.5 }}>{s.note}</div>}
            </div>
            <button className="tc-del" onClick={() => del(s.id)} aria-label="Supprimer">✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   COACH IA
   ============================================================ */
function Coach({ chat, save, context, apiKey }) {
  const insideClaude = !!(window.storage && window.storage.get);
  const needKey = !insideClaude && !apiKey;
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const endRef = useRef(null);
  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chat, busy]);
  const send = async (text) => {
    const msg = (text ?? input).trim();
    if (!msg || busy || needKey) return;
    const h = [...chat, { role: "user", text: msg }];
    save(h); setInput(""); setBusy(true);
    try {
      const reply = await askCoach(h, context, apiKey);
      save([...h, { role: "assistant", text: reply }]);
    } catch {
      save([...h, { role: "assistant", text: insideClaude ? "Connexion au coach impossible. Réessaie dans un instant." : "Connexion impossible. Vérifie ta clé API (onglet Profil) et ta connexion internet." }]);
    }
    setBusy(false);
  };
  const SUGG = ["Puis-je faire une séance intense aujourd'hui ?", "Analyse ma semaine", "Pourquoi mon risque migraine est-il élevé ?", "Que manger ce soir après ma séance ?"];
  return (
    <div>
      <h1 className="tc-h1">Coach IA</h1>
      {needKey && <div className="tc-card tc-empty">Le coach nécessite une clé API Anthropic dans cette version téléphone. Ajoute-la dans l’onglet <b>Profil</b> (section Coach IA). Elle reste stockée uniquement sur ton appareil.</div>}
      <div className="tc-muted" style={{ marginBottom: 12, fontSize: 13.5 }}>Le coach reçoit ton profil, tes 20 dernières séances, 14 jours de journal, tes migraines et ta charge ATL/CTL/TSB à chaque question.</div>
      <div className="tc-card tc-chat">
        {chat.length === 0 && <div className="tc-muted">Pose une question — ou pars d'une suggestion ci-dessous.</div>}
        {chat.map((m, i) => (
          <div key={i} className={m.role === "user" ? "tc-msg tc-me" : "tc-msg tc-ai"}>{m.text}</div>
        ))}
        {busy && <div className="tc-msg tc-ai tc-muted">Le coach analyse tes données…</div>}
        <div ref={endRef} />
      </div>
      <div className="tc-suggs">
        {SUGG.map((s, i) => <button key={i} className="tc-sugg" onClick={() => send(s)} disabled={busy}>{s}</button>)}
      </div>
      <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
        <input className="tc-in" style={{ flex: 1 }} value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()} placeholder="J'ai mal à la tête… / Comment améliorer ma natation ?" />
        <button className="tc-btn" onClick={() => send()} disabled={busy || !input.trim()}>Envoyer</button>
      </div>
      {chat.length > 0 && <button className="tc-btn tc-btn2" style={{ marginTop: 10 }} onClick={() => save([])}>Effacer la conversation</button>}
    </div>
  );
}

/* ============================================================
   RAPPORT
   ============================================================ */
function Rapport({ sessions, daily, loads, migraines }) {
  const t = todayISO();
  const wk = (offset) => {
    const end = addDays(t, -7 * offset);
    const start = addDays(end, -6);
    const ss = sessions.filter(s => s.date >= start && s.date <= end);
    const days = [];
    for (let d = start; d <= end; d = addDays(d, 1)) if (daily[d]) days.push(daily[d]);
    const avg = (k) => { const v = days.map(d => d[k]).filter(x => x !== undefined); return v.length ? +(v.reduce((a, b) => a + b, 0) / v.length).toFixed(1) : null; };
    return {
      label: offset === 0 ? "Cette semaine" : offset === 1 ? "Semaine dernière" : `S−${offset}`,
      nb: ss.length,
      min: ss.reduce((a, s) => a + s.durationMin, 0),
      km: +ss.reduce((a, s) => a + (s.distKm || 0), 0).toFixed(1),
      tss: ss.reduce((a, s) => a + s.tss, 0),
      sleep: avg("sleepH"), water: avg("waterL"), stress: avg("stress"), screen: avg("screenH"),
      mig: migraines.filter(m => m.date >= start && m.date <= end).length,
    };
  };
  const weeks = [wk(0), wk(1), wk(2), wk(3)];
  const byDisc = {};
  sessions.filter(s => s.date >= addDays(t, -27)).forEach(s => { byDisc[s.disc] = (byDisc[s.disc] || 0) + s.durationMin; });
  const discData = Object.entries(byDisc).map(([k, v]) => ({ name: DISC[k].label, min: v, fill: DISC[k].color }));
  const [best, setBest] = useState({ dist: 10, min: 50 });
  const targets = [["5 km", 5], ["10 km", 10], ["Semi", 21.1], ["Marathon", 42.2]];
  return (
    <div>
      <h1 className="tc-h1">Rapport</h1>
      <div className="tc-card">
        <div className="tc-cardtitle">Bilan sur 4 semaines</div>
        <table className="tc-table">
          <thead><tr><th>Semaine</th><th>Séances</th><th>Heures</th><th>Km</th><th>TSS</th><th>Sommeil moy.</th><th>Migraines</th></tr></thead>
          <tbody>
            {weeks.map((w, i) => (
              <tr key={i}><td>{w.label}</td><td>{w.nb}</td><td>{(w.min / 60).toFixed(1)}</td><td>{w.km}</td><td>{w.tss}</td><td>{w.sleep ?? "—"}{w.sleep ? " h" : ""}</td><td style={{ color: w.mig > 0 ? "var(--bad)" : "var(--tx)" }}>{w.mig}</td></tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="tc-grid2">
        <div className="tc-card">
          <div className="tc-cardtitle">Répartition par discipline — 4 semaines (min)</div>
          {discData.length === 0 ? <div className="tc-muted">Pas encore de séances sur la période.</div> : (
            <DiscBars data={discData} />
          )}
        </div>
        <div className="tc-card">
          <div className="tc-cardtitle">Prédicteur course à pied (formule de Riegel)</div>
          <div className="tc-grid2">
            <Field label="Meilleure perf : distance (km)"><input className="tc-in" type="number" step="0.1" value={best.dist} onChange={e => setBest({ ...best, dist: +e.target.value })} /></Field>
            <Field label="Temps (min)"><input className="tc-in" type="number" value={best.min} onChange={e => setBest({ ...best, min: +e.target.value })} /></Field>
          </div>
          {best.dist > 0 && best.min > 0 && (
            <table className="tc-table" style={{ marginTop: 10 }}>
              <tbody>
                {targets.map(([l, d]) => (
                  <tr key={l}><td>{l}</td><td style={{ fontWeight: 600 }}>{fmtTime(riegel(best.dist, best.min, d))}</td><td className="tc-muted">{fmtTime(riegel(best.dist, best.min, d) / d)}/km</td></tr>
                ))}
              </tbody>
            </table>
          )}
          <div className="tc-muted" style={{ fontSize: 12.5, marginTop: 8 }}>Extrapolation valable si l'endurance suit (marathon : fiable seulement avec le volume long adapté).</div>
        </div>
      </div>
    </div>
  );
}

/* ============ RÉGLAGES (clé API + sauvegarde/restauration) ============ */
function Reglages({ apiKey, saveApiKey, data, restore }) {
  const [key, setKey] = useState(apiKey);
  const fileRef = useRef(null);
  const exportAll = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "tricopilot-sauvegarde-" + todayISO() + ".json";
    a.click();
  };
  const importAll = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const d = JSON.parse(r.result);
        if (d.profile) restore.profile(d.profile);
        if (d.sessions) restore.sessions(d.sessions);
        if (d.daily) restore.daily(d.daily);
        if (d.migraines) restore.migraines(d.migraines);
        alert("Données restaurées.");
      } catch { alert("Fichier invalide."); }
    };
    r.readAsText(file);
  };
  return (
    <div className="tc-card">
      <div className="tc-cardtitle">Coach IA — clé API Anthropic</div>
      <div className="tc-muted" style={{ fontSize: 13, marginBottom: 8 }}>
        Nécessaire uniquement dans la version téléphone (hors Claude). Créée sur console.anthropic.com.
        La clé est stockée sur cet appareil seulement — ne la partage jamais.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <input className="tc-in" type="password" style={{ flex: 1, minWidth: 220 }} value={key}
          onChange={e => setKey(e.target.value)} placeholder="sk-ant-…" />
        <button className="tc-btn" onClick={() => saveApiKey(key.trim())}>Enregistrer la clé</button>
      </div>
      <div className="tc-cardtitle" style={{ marginTop: 20 }}>Sauvegarde des données</div>
      <div className="tc-muted" style={{ fontSize: 13, marginBottom: 8 }}>
        Les données vivent dans le stockage du navigateur. Exporte régulièrement un fichier de sauvegarde —
        si tu effaces les données de navigation, tout part avec.
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <button className="tc-btn tc-btn2" onClick={exportAll}>Exporter toutes mes données (JSON)</button>
        <button className="tc-btn tc-btn2" onClick={() => fileRef.current.click()}>Restaurer une sauvegarde</button>
        <input ref={fileRef} type="file" accept=".json" style={{ display: "none" }} onChange={importAll} />
      </div>
    </div>
  );
}
